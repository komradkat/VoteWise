{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Initialize theme before anything else to prevent flashing
        (function() {
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Resource Hints for Performance -->
    <link rel="dns-prefetch" href="//fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <title>{% block title %}VoteWise{% endblock %}</title>

    <!-- FontAwesome (from original base) -->
    <link rel="stylesheet" href="{% static 'css/vendor/fontawesome.min.css' %}" onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css';">

    <!-- DaisyUI & Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- VoteWise Theme Engine -->
    <script src="{% static 'js/theme-config.js' %}"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.8/dist/cdn.min.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>

    <style>
        html {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        * {
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }
    </style>
    {% block css %}{% endblock %}
</head>
<body class="min-h-screen bg-base-200 text-base-content flex flex-col font-sans" style="font-family: 'Inter', sans-serif;" x-data="{ currentTheme: document.documentElement.getAttribute('data-theme') }">
    {% include 'includes/header.html' %}

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'includes/footer.html' %}

    {% block extra_scripts %}{% endblock %}
    {% block js %}{% endblock %}
</body>
</html>
